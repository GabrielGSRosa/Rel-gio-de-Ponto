<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP | Marcação de Ponto</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="container">
        <div id="container-ponto" class="container-ponto">
            <h1>Relógio de Ponto</h1>
            <div class="time" id="current-time"></div>
            <div class="buttons">
                <button id="marcarPontoBtn">Marcar Ponto</button>
            </div>
        </div>
        <button id="cadastrarNovoUsuarioBtn" class="register-button" onclick="mostrarFormulario()">Cadastrar Novo Usuário</button>
        <button id="voltar" class="register-button btnVoltar" onclick="voltar()">Voltar para o Relógio</button>
        <form id="cadastroForm" class="cadastroForm">
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
            </div>
            <div class="form-group">
                <label for="sobrenome">Sobrenome:</label>
                <input type="text" id="sobrenome" name="sobrenome" required>
            </div>
            <div class="form-group">
                <label for="dataNascimento">Data de Nascimento:</label>
                <input type="date" id="dataNascimento" name="dataNascimento" required>
            </div>
            <div class="form-group">
                <label for="genero">Gênero:</label>
                <select id="genero" name="genero" required>
                    <option value="" disabled selected>Selecione o gênero</option>
                    <option value="masculino">Masculino</option>
                    <option value="feminino">Feminino</option>
                    <option value="outro">Outro</option>
                </select>
            </div>
            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <button type="submit">Enviar</button>
            </div>
        </form>
    </div>

    <script src="./app.js"></script>
</body>
</html>
